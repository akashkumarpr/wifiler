<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wifiler</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            color: #222;
        }
        h1 { font-size: 20px; margin: 0 0 4px; }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; color: #888; margin: 28px 0 8px; }

        .top { text-align: center; padding-bottom: 16px; border-bottom: 1px solid #e5e5e5; }
        .top img { width: 140px; height: 140px; }
        .top .url { font-family: monospace; font-size: 13px; color: #555; margin-top: 6px; word-break: break-all; }
        .status { display: inline-block; font-size: 12px; margin-top: 8px; padding: 2px 8px; border-radius: 10px; }
        .status.on { color: #1a7a3a; background: #e6f6ea; }
        .status.off { color: #a33; background: #fbe9e9; }

        .path { font-family: monospace; font-size: 13px; color: #555; padding: 8px 0; }

        button, .btn {
            font: inherit;
            font-size: 14px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            color: #222;
        }
        button:hover, .btn:hover { background: #f5f5f5; }
        button:disabled { color: #999; cursor: default; }

        #up-button { width: 100%; text-align: left; margin-bottom: 10px; }

        .upload-zone {
            display: block;
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-size: 14px;
        }
        .upload-zone input { display: none; }
        #file-count { margin-top: 6px; font-size: 13px; color: #333; }
        #submit-btn { width: 100%; margin-top: 10px; }

        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .item:last-child { border-bottom: none; }
        .item.dir { cursor: pointer; }
        .name { font-size: 14px; word-break: break-all; margin-right: 10px; }
        .empty, .note { font-size: 14px; color: #888; }
        .note.error { color: #a33; }
    </style>
</head>
<body>

<div class="top">
    <img id="web-qr" src="" alt="QR code">
    <div class="url" id="web-url">Connecting…</div>
    <div id="sync-status" class="status off">Sync offline</div>
</div>

<h2>Location</h2>
<div id="current-path" class="path">Loading…</div>
<button id="up-button" onclick="navigateUp()" title="You can't go above the shared folder">.. Go up</button>

<div id="upload-container">
    <h2>Upload</h2>
    <form id="upload-form">
        <label class="upload-zone">
            Tap to choose files
            <input type="file" id="file-input" multiple onchange="showSelectedFiles()">
            <div id="file-count"></div>
        </label>
        <button type="submit" id="submit-btn">Upload to current folder</button>
    </form>
</div>

<h2>Files</h2>
<div id="file-list">Loading…</div>

<script>
    async function loadDashboard() {
        try {
            const response = await fetch('/api/files');
            if (response.status === 401) {
                document.getElementById('file-list').innerHTML =
                    '<p class="note error">Session expired or invalid. Rescan the QR code on the host computer.</p>';
                document.getElementById('upload-container').style.display = "none";
                document.getElementById('up-button').style.display = "none";
                return;
            }
            const data = await response.json();

            document.getElementById('web-qr').src = data.qrCode;
            document.getElementById('web-url').innerText = data.url;
            document.getElementById('current-path').innerText = data.currentPath;
            document.getElementById('upload-container').style.display = "block";
            document.getElementById('up-button').style.display = data.isRoot ? "none" : "block";

            const listContainer = document.getElementById('file-list');
            if (!data.items || data.items.length === 0) {
                listContainer.innerHTML = '<p class="empty">Empty folder.</p>';
                return;
            }

            listContainer.innerHTML = data.items.map(item => {
                if (item.isDir) {
                    return `
                        <div class="item dir" onclick="changeDirectory('${encodeURIComponent(item.name)}')">
                            <span class="name">📁 ${item.name}</span>
                            <span class="btn">Open</span>
                        </div>
                    `;
                } else {
                    return `
                        <div class="item">
                            <span class="name">📄 ${item.name}</span>
                            <a href="/files/${encodeURIComponent(item.name)}" download="${item.name}" class="btn">Get</a>
                        </div>
                    `;
                }
            }).join('');
        } catch (err) {
            document.getElementById('file-list').innerHTML = '<p class="note error">Failed to load file list.</p>';
        }
    }

    async function changeDirectory(folderName) {
        await fetch(`/api/cd?target=${folderName}`, { method: 'POST' });
        loadDashboard();
    }

    async function navigateUp() {
        await fetch('/api/cd/up', { method: 'POST' });
        loadDashboard();
    }

    function connectSyncSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${protocol}//${window.location.host}/ws`);
        const badge = document.getElementById('sync-status');

        socket.onopen = () => {
            badge.innerText = "Sync active";
            badge.className = "status on";
        };

        socket.onmessage = (event) => {
            if (event.data === "reload") loadDashboard();
        };

        socket.onclose = () => {
            badge.innerText = "Sync offline (reconnecting…)";
            badge.className = "status off";
            setTimeout(connectSyncSocket, 2000);
        };
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('file-input');
        if (fileInput.files.length === 0) return;

        const formData = new FormData();
        for (const file of fileInput.files) { formData.append('files', file); }

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = 'Uploading…';

        try {
            await fetch('/api/upload', { method: 'POST', body: formData });
            fileInput.value = '';
            document.getElementById('file-count').innerText = '';
        } catch (err) {
            alert('Upload failed.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Upload to current folder';
        }
    });

    function showSelectedFiles() {
        const input = document.getElementById('file-input');
        document.getElementById('file-count').innerText = `Selected: ${input.files.length} file(s)`;
    }

    loadDashboard();
    connectSyncSocket();
</script>
</body>
</html>
